aid: locus-sh
name: Locus
description: Locus is an AI-powered last-mile and dispatch logistics platform headquartered
  in Bengaluru, India (with US operations in Wilmington, Delaware) that helps enterprises
  plan, execute, and orchestrate deliveries across captive, contracted, outsourced,
  and hybrid fleets. The platform spans transportation management, dispatch planning
  and route optimization (across 180+ variables including time, distance, fuel, capacity,
  and SLAs), hub operations, delivery orchestration and carrier management, fulfillment
  automation, driver app and control tower track-and-trace, and analytics. Locus claims
  360+ enterprise customers across 30+ countries — including Unilever, Nestlé, Blue
  Dart DHL, Meesho, Lenskart, and Justo — with 1.5B+ deliveries optimized and $320M+
  in cost savings generated. The company was acquired by Ingka Group (the world's
  largest IKEA retailer) in 2024 while continuing to operate as an independent product
  organization. Locus exposes a SwaggerUI developer surface with three OpenAPI 2.0
  specifications covering Order Management (oms.locus-api.com), Entity Management
  (locus-api.com), and Platform Entities (platform.locus-api.com); authentication
  is via HTTP Basic plus API key, provisioned by a Locus representative.
