  - url: graphql/locus-sh-graphql.md
    type: GraphQL
- aid: locus-sh:locus-entity-management-api
  name: Locus Entity Management API
  description: 'Manage core delivery-domain entities on the Locus platform: locations,
    riders, rider personas, rosters (including auto-create), shift managers, transporters,
    vehicles, vehicle models, homebases, and line items. Each entity supports create/update,
    fetch, and disable operations against base URL https://locus-api.com/v1.'
  humanURL: https://docs.locus.sh/?model=https://docs.locus.sh/apis/taxy-backend/v1/entities.json&host=https://locus-api.com/v1
  baseURL: https://locus-api.com/v1
  tags:
