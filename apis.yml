  - Locations
  - Rosters
  - Transporters
  - Homebase
  - Line Items
  properties:
  - type: Documentation
    url: https://docs.locus.sh/?model=https://docs.locus.sh/apis/taxy-backend/v1/entities.json&host=https://locus-api.com/v1
  - type: OpenAPI
    url: openapi/locus-entities-openapi.yml
  - type: Signup
    url: https://locus.sh/schedule-demo/
- aid: locus-sh:locus-platform-entities-api
  name: Locus Platform Entities API
  description: Manage personnel and team master records on the Locus platform service.
    Provides a compact personnel-create operation, personnel and team status management,
    and team master upserts against base URL https://platform.locus-api.com/v1.
