- aid: locus-sh:locus-order-management-api
  name: Locus Order Management API
  description: Manage the delivery order lifecycle on the Locus OMS — create, retrieve,
    cancel, complete, open, park, reschedule, and verify inventory for client orders,
    plus look up delivery slots and configure service types. Base URL https://oms.locus-api.com/v1.
  humanURL: https://docs.locus.sh/?model=https://docs.locus.sh/apis/locus-oms/v1/order-management.json&host=https://oms.locus-api.com/v1
