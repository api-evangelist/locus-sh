  DiscountIdParam:
    name: discountId
    in: path
    description: Id of the discount
    required: true
    type: string
  ConstraintIdParam:
    name: constraintId
    in: path
    description: Id of the constraint
    required: true
    type: string
  RoleIdParam:
    name: roleId
    in: path
    description: Id of the role
    required: true
    type: string
  InvoiceIdParam:
    name: invoiceId
    in: path
    description: Id of the invoice
    required: true
    type: string
  NoDueIdParam:
    name: noDueId
