      required:
      - serviceTypeId
      - serviceTypeName
      - orderTypes
      - maxDeliveryDays
      - maxDeliveryTime
      properties:
        orderType:
          $ref: '#/definitions/OrderType'
        teams:
          description: List of teams of carrier client to consider for this task assignment
          type: array
          items:
            type: string
        serviceabilityMapIds:
          description: List of zone ids that the service is serviceable to
          type: array
          items:
            type: string
        maxDeliveryDays:
          type: integer
