      customer slot ID.
    required:
    - id
    - orderId
    - serviceTypeId
    - slotId
    properties:
      id:
        type: string
        description: Id provided in the Get Promise Response
        minLength: 1
      orderId:
        type: string
        description: Unique order identifier
        minLength: 1
      serviceTypeId:
        type: string
        description: Service Type ID for the promise
        minLength: 1
      slotId:
        type: string
        description: Customer-facing slot identifier (contains temporal information)
        minLength: 1
      locationId:
        type: string
        description: Master location id for the drop location (optional)
  UpdatePromiseByServiceTypeAndCustomerSlotRequest:
    type: object
    description: Request model for updating a promise with service type and customer slot ID. System infers dates from the
      customer slot ID.
    required:
    - id
    - serviceTypeId
    - slotId
    - reason
    properties:
      id:
        type: string
        description: Id provided in the Get Promise Response
        minLength: 1
      serviceTypeId:
        type: string
        description: New Service Type ID for the promise
        minLength: 1
      slotId:
        type: string
        description: Customer-facing slot identifier for the new slot (contains temporal information)
        minLength: 1
      reason:
        $ref: '#/definitions/Reason'
  CreatePromiseInformationRequest:
    properties:
      serviceTypeId:
        type: string
