        type: string
        description: Service Type ID for the promise
        minLength: 1
      locationId:
        type: string
        description: Master location id for the drop location (optional)
  BaseUpdatePromiseRequest:
    type: object
    description: Base request model for updating promises with common fields
    required:
    - id
    - serviceTypeId
    - reason
    properties:
      id:
        type: string
        description: Id provided in the Get Promise Response
        minLength: 1
      serviceTypeId:
        type: string
        description: Service Type ID for the promise
        minLength: 1
      reason:
        $ref: '#/definitions/Reason'
  ConfirmPromiseByServiceTypeRequest:
    allOf:
    - $ref: '#/definitions/BaseConfirmPromiseRequest'
    - type: object
      description: Request model for confirming a promise with only service type specified. System automatically selects the
        best available slot.
  ConfirmPromiseByServiceTypeAndDatesRequest:
    allOf:
    - $ref: '#/definitions/BaseConfirmPromiseRequest'
    - type: object
      description: Request model for confirming a promise with service type and specific dates. System selects the best available
        slot from provided dates.
      required:
      - dateSlots
      properties:
        dateSlots:
          type: array
          items:
            $ref: '#/definitions/DateSlotInfoElement'
  ConfirmPromiseByExactSlotRequest:
    allOf:
    - $ref: '#/definitions/BaseConfirmPromiseRequest'
    - type: object
      description: Request model for confirming a promise with exact slot specification. Provides complete control over the
        exact delivery slot.
      required:
      - dateSlots
      properties:
        dateSlots:
          type: array
          items:
            $ref: '#/definitions/DateSlotInfoElement'
  UpdatePromiseByServiceTypeRequest:
    allOf:
    - $ref: '#/definitions/BaseUpdatePromiseRequest'
    - type: object
      description: Request model for updating a promise with only service type specified. System finds the best available
        slot for the new service type.
  UpdatePromiseByServiceTypeAndDatesRequest:
    allOf:
    - $ref: '#/definitions/BaseUpdatePromiseRequest'
    - type: object
      description: Request model for updating a promise with service type and specific dates. System finds the best available
        slot from provided dates.
      required:
      - dateSlots
      properties:
        dateSlots:
          type: array
          items:
            $ref: '#/definitions/DateSlotInfoElement'
  UpdatePromiseByExactSlotRequest:
    allOf:
    - $ref: '#/definitions/BaseUpdatePromiseRequest'
    - type: object
      description: Request model for updating a promise with exact slot specification. Provides complete control over the
        new exact delivery slot.
      required:
      - dateSlots
      properties:
        dateSlots:
          type: array
          items:
            $ref: '#/definitions/DateSlotInfoElement'
  ConfirmPromiseByServiceTypeAndCustomerSlotRequest:
